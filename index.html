<p><b>Verse Range: 8–20 | Ruku: 02</b></p>

<p><b>The Anatomy of Hypocrisy</b></p>

<p>
In Madinah, the Prophet ﷺ faced a challenge that did not exist in Makkah: <b>Nifaq</b> (Hypocrisy). While the battle lines in Makkah were clear, the social landscape of Madinah was layered. A group of people, primarily led by Abdullah ibn Ubayy ibn Salul, realized that Islam was becoming the dominant political power. To protect their status and wealth, they claimed to be Muslims with their tongues while harboring hatred and doubt in their hearts.
</p>

<p>

</p>

<p>

</p>

<b>जो ग़ैब (अनदेखी चीज़ों) पर ईमान लाते हैं, नमाज़ क़ायम करते हैं और जो कुछ हमने उन्हें दिया है उसमें से ख़र्च करते हैं। और जो ईमान लाते हैं उस पर जो आपकी तरफ़ उतारा गया और जो आपसे पहले उतारा गया, और आख़िरत पर वे यक़ीन रखते हैं। यही लोग अपने रब की तरफ़ से हिदायत पर हैं और यही लोग कामयाब होने वाले हैं।</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
These verses outline the five-fold identity of a believer. It starts with the <b>Intellectual</b> (Belief in the Unseen), moves to the <b>Physical/Spiritual</b> (Establishing Prayer), and then to the <b>Social/Financial</b> (Charity). It requires a global outlook, accepting all previous Prophets. The Ruku uses the word <b>"Ala"</b> (Upon) regarding their guidance, suggesting that guidance is like a steady mount that carries the believer through the storms of life toward <b>"Falah"</b> (Success).
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. Belief in the "Unseen" (<i>Ghayb</i>) is the foundation of faith. It includes believing in Allah, the Angels, Paradise, and Hell—realities that cannot be perceived by the five senses but are known through revelation. By saying "out of what <b>We</b> provided," Allah reminds the believer that their wealth is a trust, making the act of giving an act of returning a loan to the Creator.
</p>

<p>
2. True success (<i>Falah</i>) is not defined by bank balances or social status. It is defined by being in harmony with the Creator's plan. The certainty (<i>Yaqeen</i>) of the Hereafter is what differentiates a believer from a materialist; it changes how one prioritizes their time and energy in this temporary life.
</p>

<h4>6–7. The Sealed Hearts</h4>

<blockquote>
<b>إِنَّ ٱلَّذِينَ كَفَرُوا۟ سَوَآءٌ عَلَيْهِمْ ءَأَنذَرْتَهُمْ أَمْ لَمْ تُنذِرْهُمْ لَا يُؤْمِنُونَ ﴿٦﴾ خَتَمَ ٱللَّهُ عَلَىٰ قُلُوبِهِمْ وَعَلَىٰ سَمْعِهِمْ ۖ وَعَلَىٰٓ أَبْصَٰرِهِمْ غِشَٰوَةٌ ۖ وَلَهُمْ عَذَابٌ عَظِيمٌ ﴿٧﴾</b><br><br>
<b>"Indeed, those who disbelieve - it is all the same for them whether you warn them or do not warn them - they will not believe. Allah has set a seal upon their hearts and upon their hearing, and over their vision is a veil..."</b><br><br>
<b>बेशक जिन लोगों ने कुफ़्र अपनाया, उनके लिए बराबर है कि आप उन्हें डराएं या न डराएं, वे ईमान नहीं लाएंगे। अल्लाह ने उनके दिलों पर मुहर लगा दी है और उनके कानों पर भी, और उनकी आँखों पर परदा है...</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
After describing the light of the believers, the Quran shifts to the darkness of the "Active Rejectors" (<i>Kafirun</i>). This is not about people who haven't heard the message, but those who have decided to oppose it regardless of the evidence. Because they repeatedly closed their own eyes and ears to the truth, Allah allowed their natural state of rejection to become permanent—described as a <b>"Seal"</b> (<i>Khatam</i>) and a <b>"Veil"</b> (<i>Ghishawah</i>).
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. This verse was a comfort to the Prophet ﷺ, who felt deep sorrow when people rejected the truth. Allah explains that their disbelief is a result of their own stubborn choice. When a person intentionally turns away from the light for too long, their heart loses the capacity to perceive it.
</p>

<p>
2. The "Seal" is a spiritual consequence of arrogance. It doesn't mean Allah forced them to disbelieve; rather, it means that because they insisted on Kufr, Allah allowed their hearts to be locked in that state. They have physical eyes and ears, but their spiritual perception is dead.
</p>

<h3>Seerah and Context</h3>

<p><b>Verse Range: 1–7 | Ruku: 01</b></p>

<p><b>The Essence of the Quran</b></p>

<p>
Surah Al-Fatiha is the "Mother of the Book" (<i>Umm al-Kitab</i>). Unlike the long, legislative Surahs revealed in Madinah, Al-Fatiha was revealed in Makkah. It serves as the opening chapter of the Quran and the fundamental prayer for every Muslim. It is unique because it is composed entirely as a direct conversation between the servant and the Creator—the first half praises Allah, and the second half presents the servant’s needs. It is the bridge between human limitation and Divine Majesty.
</p>

<h4>1–2. The Opening and the Praise</h4>

<blockquote>
<b>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ﴿١﴾ الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ ﴿٢﴾</b><br><br>
<b>"In the name of Allah, the Entirely Merciful, the Especially Merciful. [All] praise is [due] to Allah, Lord of the worlds."</b><br><br>
<b>अल्लाह के नाम से, जो निहायत मेहरबान, बहुत रहम करने वाला है। सब तारीफें अल्लाह ही के लिए हैं, जो तमाम जहानों का रब है।</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
Every great action in Islam begins with the <b>"Basmala"</b> (In the name of Allah), acknowledging that we act only by His permission and strength. The word <b>"Al-Hamd"</b> is specific; it is not just "thanks" but the recognition of perfection. By calling Him the <b>"Rabb"</b> (Lord/Sustainer) of the <b>"Alamin"</b> (Worlds/Universes), the verse humbles the human ego, reminding us that we are part of a vast, governed existence, not the center of it.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. <i>Ar-Rahman</i> and <i>Ar-Rahim</i> are two forms of mercy. <i>Rahman</i> is His general mercy that sustains all life on earth, while <i>Rahim</i> is His specific, eternal mercy reserved for the believers in the Hereafter. Starting with these names reminds the servant that the Creator is approachable through kindness, not just power.
</p>

<p>
2. "Lord of the Worlds" implies that Allah is the Creator, Owner, and Nurturer of everything—from the angels in the highest heavens to the smallest insects on earth. His Lordship is absolute; everything exists because He wills it to exist.
</p>

<h4>3–4. The Ownership of Judgment</h4>

<blockquote>
<b>الرَّحْمَٰنِ الرَّحِيمِ ﴿٣﴾ مَالِكِ يَوْمِ الدِّينِ ﴿٤﴾</b><br><br>
<b>"The Entirely Merciful, the Especially Merciful. Sovereign of the Day of Recompense."</b><br><br>

</blockquote>

<p><b>Literary Explanation</b></p>

<p>
After establishing His Mercy, Allah reminds us of His Justice. <b>"Maliki Yawm ad-Din"</b>—the Master of the Day of Judgment. This verse bridges the gap between our current life and our eternal destination. It teaches that the same Mercy we seek today is the authority that will judge our actions tomorrow. It keeps the heart in a state of balance: hopeful because of His Mercy, but aware because of His Justice.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. The "Day of Recompense" is the day when the veil of the worldly life is lifted and every soul is confronted with its own deeds. Allah being the "Owner" means there is no appeal and no authority besides His on that Day.
</p>

<p>
2. Acknowledging Allah as the Master of the Day of Judgment instills a sense of accountability. It prevents a person from living carelessly, knowing that every action, no matter how small, is being recorded by the Sovereign of that Day.
</p>

<h4>5. The Core of Worship</h4>

<blockquote>
<b>إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ ﴿٥﴾</b><br><br>
<b>"It is You we worship and You we ask for help."</b><br><br>
<b>हम सिर्फ तेरी ही इबादत करते हैं और सिर्फ तुझ ही से मदद मांगते हैं।</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
This verse is the center of the Surah. It switches from describing Allah in the third person to addressing Him directly (<b>"You"</b>). The phrasing is specific: <b>"Iyyaka"</b> (You alone). It signifies a total surrender. We declare that our devotion is for Him alone and our reliance is on Him alone. It is a vow of loyalty that frees the believer from relying on anything other than the Creator.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. Worship (<i>Ibadah</i>) is the goal of our existence, and Seeking Help (<i>Isti'anah</i>) is the method to achieve it. We worship Him because He is worthy of it, and we ask His help because we are too weak to worship Him without His support.
</p>

<p>
2. This verse cures the soul of "shirk" (associating partners with Allah). By saying "We ask help from You," we acknowledge that while we may seek assistance from humans in daily tasks, the <i>ultimate</i> source of all power, healing, and success is Allah alone.
</p>

<h4>6–7. The Final Petition</h4>

<blockquote>
<b>اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ ﴿٦﴾ صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ ﴿٧﴾</b><br><br>
<b>"Guide us to the straight path. The path of those upon whom You have bestowed favor, not of those who have evoked [Your] anger or of those who are astray."</b><br><br>
<b>हमें सीधा रास्ता दिखा। उन लोगों का रास्ता जिन पर तूने इनाम किया, न उनका रास्ता जिन पर ग़ज़ब हुआ और न उनका रास्ता जो गुमराह हुए।</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
The prayer concludes with a request for <b>"As-Sirat al-Mustaqim"</b> (The Straight Path). It is not a request for a shortcut, but for a constant, balanced direction. We seek the company of the "Favored ones" (Prophets, Saints, and Martyrs). We also explicitly ask to be saved from two failures: <b>"Al-Maghdub"</b> (those who knew the truth but rejected it, like those who earned wrath) and <b>"Ad-Dallin"</b> (those who lost their way due to ignorance).
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. Guidance is a continuous process; even the believers need to ask for it every day. The "Straight Path" is the path of Islam, which is the shortest distance between a human heart and its Creator.
</p>

<p>
2. The three groups are:
<br>• The <b>Favored</b>: Those who received truth and followed it with sincerity.
<br>• The <b>Wrath-earned</b>: Those who saw the truth, understood it, but stubbornly opposed it.
<br>• The <b>Astray</b>: Those who lost the path because they sought it without the light of Divine revelation.
</p>

<h3>Seerah and Context</h3>

<p><b>Verse Range: 21–29 | Ruku: 03</b></p>

<p><b>The Call to All Mankind</b></p>

<p>
After defining the three categories of people—the Believers, the Rejectors, and the Hypocrites—the Quran shifts its focus to a universal audience. This Ruku marks the first time in the Surah where Allah addresses <b>"An-Nas"</b> (All Mankind), regardless of their faith or background.
</p>

<p>
In Madinah, this served as a foundational invitation. It invites the pagans, the People of the Book, and everyone else to stop, reflect, and recognize their Creator. It presents the most logical argument for the truth of the Quran: if you doubt it is from Allah, try to create something similar. It is a challenge to human pride, urging people to return to the simple, logical reality of Monotheism (Tawhid).
</p>

<h4>21–22. The Universal Invitation</h4>

<blockquote>
<b>يَا أَيُّهَا النَّاسُ اعْبُدُوا رَبَّكُمُ الَّذِي خَلَقَكُمْ وَالَّذِينَ مِن قَبْلِكُمْ لَعَلَّكُمْ تَتَّقُونَ ﴿٢١﴾ الَّذِي جَعَلَ لَكُمُ الْأَرْضَ فِرَاشًا وَالسَّمَاءَ بِنَاءً وَأَنزَلَ مِنَ السَّمَاءِ مَاءً فَأَخْرَجَ بِهِ مِنَ الثَّمَرَاتِ رِزْقًا لَّكُمْ... ﴿٢٢﴾</b><br><br>
<b>"O mankind, worship your Lord, who created you and those before you, that you may become righteous [Muttaqin]. [He] who made for you the earth a bed [spread out] and the sky a ceiling and sent down, rain, from the sky and brought forth thereby fruits as provision for you..."</b><br><br>
<b>ऐ लोगों! अपने उस रब की इबादत करो जिसने तुम्हें और तुमसे पहले वालों को पैदा किया, ताकि तुम परहेज़गार बन सको। जिसने तुम्हारे लिए ज़मीन को बिछौना और आसमान को छत बनाया और आसमान से पानी बरसाया, फिर उससे तुम्हारे खाने के लिए फल निकाले...</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
The invitation begins with <b>"Ya Ayyuhan-Nas"</b> (O Mankind), a call that recognizes no borders or tribes. It grounds the concept of worship in logic: the One who created you and sustained your ancestors is the only One who deserves your submission. The description of Earth as a <b>"Firash"</b> (Bed/Spread out) and the Sky as a <b>"Bina"</b> (Canopy/Ceiling) illustrates the precision of the universe. It points to a "System" that is designed specifically for human survival, implying that such design cannot be an accident.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. The goal of worship is <i>Taqwa</i> (Righteousness). The Quran links the physical environment (rain, fruits, earth) to the moral life. Since Allah provides the physical sustenance, it is logical to follow His guidance for spiritual sustenance.
</p>

<p>
2. Acknowledging Allah as the Creator of "those before you" reminds us that we are part of a long history of human beings who lived, relied on Allah's provision, and passed on. It humbles the arrogant who think they have "conquered" the earth by their own power.
</p>

<h4>23–24. The Challenge of the Quran</h4>

<blockquote>
<b>وَإِن كُنتُمْ فِي رَيْبٍ مِّمَّا نَزَّلْنَا عَلَىٰ عَبْدِنَا فَأْتُوا بِسُورَةٍ مِّن مِّثْلِهِ وَادْعُوا شُهَدَاءَكُم مِّن دُونِ اللَّهِ إِن كُنتُمْ صَادِقِينَ ﴿٢٣﴾ فَإِن لَّمْ تَفْعَلُوا وَلَن تَفْعَلُوا فَاتَّقُوا النَّارَ الَّتِي وَقُودُهَا النَّاسُ وَالْحِجَارَةُ... ﴿٢٤﴾</b><br><br>
<b>"And if you are in doubt about what We have sent down upon Our Servant [Muhammad], then produce a surah the like thereof and call upon your witnesses other than Allah, if you should be truthful. But if you do not - and you will never be able to - then fear the Fire, whose fuel is men and stones..."</b><br><br>
<b>और अगर तुम्हें उस किताब के बारे में शक है जो हमने अपने बंदे पर उतारी है, तो उसके जैसी एक सूरत ही ले आओ और अल्लाह को छोड़कर अपने (सारे) मददगारों को बुला लो अगर तुम सच्चे हो। फिर अगर तुम ऐसा न कर सको—और तुम हरगिज़ ऐसा न कर सकोगे—तो उस आग से डरो जिसका ईंधन इंसान और पत्थर हैं...</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
This is the famous challenge of <b>"I'jaz"</b> (Inimitability). Allah challenges the greatest poets and thinkers of the time: if the Quran is just human words, then human words can replicate it. The challenge is simple: produce just <i>one</i> chapter. The absolute confidence in the phrasing <b>"wa lan taf'alu"</b> (And you will never be able to) is a historical claim that has remained unchallenged for over 1,400 years. The warning about the "Fire" serves as the final reality check for those who refuse the Truth due to pride.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. The challenge is "universal." They are told to call upon their gods, their poets, and their leaders to help them. The inability of the masters of the Arabic language to produce even a short Surah is proof that the source of this speech is not human.
</p>

<p>
2. "Fuel of men and stones" is a description of the severity of the Hereafter. The mention of "stones" (specifically idols or brimstone) shows that the Fire is a place where everything people used to worship <i>alongside</i> Allah will be exposed as powerless, and the hypocrites and disbelievers will be fuel for the truth they rejected.
</p>

<h4>25. The Reward of the Faithful</h4>

<blockquote>
<b>وَبَشِّرِ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ أَنَّ لَهُمْ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ... ﴿٢٥﴾</b><br><br>
<b>"And give good tidings to those who believe and do righteous deeds that they will have gardens [in Paradise] beneath which rivers flow..."</b><br><br>
<b>और जो लोग ईमान लाए और नेक काम किए उन्हें खुशखबरी दो कि उनके लिए ऐसे बाग़ हैं जिनके नीचे से नहरें बहती हैं...</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
The Quran provides the "Bishara" (Good Tidings). Faith is never a solitary internal state; it is always paired with <b>"Amilus-Salihat"</b> (Righteous deeds). The description of Paradise as having "rivers flowing beneath" is a classic image of peace and eternal life, perfectly contrasting with the burning Fire previously mentioned.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<p>
1. "Good Tidings" are for those who combine belief with action. Faith without deeds is like a tree without fruit.
</p>

<p>
2. The description of Paradise in the Quran is <i>Tashbih</i> (metaphorical), using the best imagery known to the human mind (gardens, water, luxury) to give us a taste of the eternal bliss, though the actual reality is beyond what any eye has seen or any mind has conceived.
</p>

<h4>26–29. The Parable of the Gnat</h4>

<blockquote>
<b>إِنَّ اللَّهَ لَا يَسْتَحْيِي أَن يَضْرِبَ مَثَلًا مَّا بَعُوضَةً فَمَا فَوْقَهَا... ﴿٢٦﴾ الَّذِينَ يَنقُضُونَ عَهْدَ اللَّهِ مِن بَعْدِ مِيثَاقِهِ وَيَقْطَعُونَ مَا أَمَرَ اللَّهُ بِهِ أَن يُوصَلَ وَيُفْسِدُونَ فِي الْأَرْضِ... ﴿٢٧﴾</b><br><br>
<b>"Indeed, Allah is not timid to present an example - that of a mosquito or what is smaller than it... [The disbelievers are] those who break the covenant of Allah after contracting it and sever that which Allah has ordered to be joined and cause corruption on earth..."</b><br><br>

function openTab(tab){
document.querySelectorAll(".content").forEach(c=>c.classList.remove("show"));
document.getElementById(tab).classList.add("show");
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.currentTarget.classList.add("active");
}

// ===== AI =====
function openAI(text){
let prompt=text+"\n\nask me anything related to this section.";
window.open(`https://chat.openai.com/?q=${encodeURIComponent(prompt)}`);
}

// ===== AI BUTTONS =====
function addVerseAI(){
document.querySelectorAll("#contentArea h3,#contentArea h4").forEach(el=>{
if(el.parentElement.classList.contains("section")) return;

let wrap=document.createElement("div");
wrap.className="section";

let btn=document.createElement("button");
btn.className="ai-btn";
btn.innerText="AI";
btn.onclick=()=>openAI(wrap.innerText);

el.parentNode.insertBefore(wrap,el);
wrap.appendChild(btn);

while(el.nextSibling && !["H3","H4"].includes(el.nextSibling.tagName)){
wrap.appendChild(el.nextSibling);
}
wrap.insertBefore(el,btn.nextSibling);
});
}

function addBoxAI(container){
let box=document.querySelector(container+" .content-box");
if(!box || box.querySelector(".ai-btn")) return;

let btn=document.createElement("button");
btn.className="ai-btn";
btn.innerText="AI";
btn.onclick=()=>openAI(box.innerText);

box.appendChild(btn);
}

// ===== BOOKMARK (PERSISTENT) =====
let bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || {
surah:null,
seerah:null,
story:null
};

function enableBookmark(container,type){
let el=document.getElementById(container);
let timer;

el.onmousedown = el.ontouchstart = function(e){
timer=setTimeout(()=>{
let t=e.target;
if(!t.innerText || t.innerText.length<2) return;

if(bookmarks[type]){
let old=document.getElementById(bookmarks[type].id);
if(old) old.classList.remove("highlight");
}

let id="bm-"+Date.now();
t.id=id;
t.classList.add("highlight");

bookmarks[type]={id:id,content:el.innerHTML};

// 🔥 SAVE
localStorage.setItem("bookmarks", JSON.stringify(bookmarks));

alert("Bookmarked");
},600);
};

el.onmouseup = el.ontouchend = ()=>clearTimeout(timer);
}

// ===== INTER TAB NAV =====
function goBookmark(type){

let data = bookmarks[type];
if(!data){ alert("No bookmark"); return; }

let tabId = type==="surah"?"surah":type==="seerah"?"seerah":"story";

document.querySelectorAll(".content").forEach(c=>c.classList.remove("show"));
document.getElementById(tabId).classList.add("show");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
let tabIndex = type==="surah"?0:type==="seerah"?1:2;
document.querySelectorAll(".tab")[tabIndex].classList.add("active");

let targetDiv = type==="surah"?"contentArea":type==="seerah"?"seerahContent":"storyContent";

document.getElementById(targetDiv).innerHTML=
`<div class="content-box">${data.content}</div>`;

addVerseAI();
addBoxAI("#"+targetDiv);
enableBookmark(targetDiv,type);

setTimeout(()=>{
let el=document.getElementById(data.id);
if(el){
el.scrollIntoView({behavior:"smooth",block:"center"});
}
},300);
}
