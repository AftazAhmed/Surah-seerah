<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surah & Seerah Explorer</title>

<style>
body{font-family:'Segoe UI';margin:0;background:#f1f5f2;}

header{
background:#0f3d2e;color:#f5d36c;
padding:12px;text-align:center;font-weight:bold;
}

.tabs{display:flex;background:#145a42;}
.tab{flex:1;padding:10px;color:white;text-align:center;cursor:pointer;}
.active{background:#1abc9c;}

.content{display:none;padding:10px;}
.show{display:block;}

select{
width:100%;padding:10px;margin-bottom:10px;border-radius:6px;
}

.content-box,.section{
background:white;padding:12px;border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:relative;margin-bottom:10px;
}

.ai-btn{
position:absolute;top:6px;right:6px;
width:30px;height:30px;border-radius:50%;
background:linear-gradient(135deg,#7c3aed,#2563eb);
color:white;border:none;font-size:10px;cursor:pointer;
}

blockquote{
background:#f9f9f9;padding:10px;
border-left:4px solid #1abc9c;
}

.highlight{
background:#fff3a0;
}

/* BOOKMARK STYLE */
.bookmark-bar{
background:#ffffff;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.bookmark-label{
font-size:12px;
color:#555;
margin-bottom:6px;
font-weight:bold;
letter-spacing:1px;
}

.bookmark-buttons{
display:flex;
justify-content:center;
gap:8px;
}

.bookmark-btn{
padding:6px 12px;
border-radius:20px;
border:none;
font-size:12px;
cursor:pointer;
color:white;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
transition:0.2s;
}

.bookmark-btn:hover{
transform:scale(1.05);
}

/* COLORS */
.btn-surah{background:#e74c3c;}
.btn-surah:hover{background:#c0392b;}

.btn-seerah{background:#145a32;}
.btn-seerah:hover{background:#0e3d22;}

.btn-story{background:#1f3a93;}
.btn-story:hover{background:#162d6b;}
</style>

<script>

// ===== DATABASE =====
const contentDB = {};
const seerahDB = {};
const storyDB = {};

// SAMPLE
contentDB["2.5"] = {content:`<h3>Ruku 2.5</h3><p>Content</p>`};
seerahDB["1"] = {title:"Seerah",content:`<p>Seerah content</p>`};
storyDB["1"] = {title:"Story",content:`<p>Story content</p>`};
storyDB["3"] = {
title:"The Story of Salman al-Farsi (RA)",
content:`

<p>
Salman al-Farsi (RA) was a seeker of truth long before he found Islam. Born in Persia, he was raised in a wealthy family devoted to fire worship, yet his heart was never satisfied.
</p>

<p>
One day, he passed by a Christian church and was deeply moved by their prayer. He realized that this path was closer to the truth, and despite his father’s opposition, he left everything behind in search of guidance.
</p>

<p>
His journey took him across lands, serving different priests. Some were corrupt, but a few were sincere. Each righteous teacher guided him closer to the final truth, telling him about a coming Prophet.
</p>

<blockquote>
<b>"A Prophet will emerge in the land of the Arabs... he will accept gifts but not charity."</b>
</blockquote>

<p>
Determined, Salman (RA) traveled toward Arabia but was betrayed and sold into slavery. He eventually arrived in Madinah, where he waited patiently for the signs he had been told about.
</p>

<p>
When the Prophet Muhammad (PBUH) arrived, Salman (RA) tested him. He offered food as charity — the Prophet did not eat. Then he offered a gift — the Prophet accepted it. Finally, he saw the Seal of Prophethood.
</p>

<p>
At that moment, Salman (RA) knew he had found the truth. He embraced Islam and became one of the closest companions of the Prophet (PBUH).
</p>

<p>
Later, during the Battle of the Trench, it was Salman (RA) who suggested digging a trench — a strategy from Persia — which saved Madinah from invasion.
</p>

<p>
The Prophet (PBUH) honored him with the words:
</p>

<blockquote>
<b>"Salman is from us, the People of the Household."</b>
</blockquote>

<p>
His story teaches that sincere seekers of truth will always be guided, no matter how long or difficult the journey.
</p>

`
};
seerahDB["4"] = {
title:"The Title of Al-Amin",
content:`
<p>
Long before revelation, the Prophet ﷺ was known as <b>Al-Amin</b>.
</p>

<p>
During the rebuilding of the Kaaba, he resolved a major conflict by uniting all tribes.
</p>

<blockquote>
<i>"O mankind, eat what is lawful..."</i><br>
<b>(Surah Al-Baqarah 2:168)</b>
</blockquote>
`
};
contentDB["4.5"] = {
content:`
<h3>Surah Al-Baqarah</h3>

<h4>The Call to Bani Isra'il</h4>

<p>
This Ruku marks the beginning of a long and detailed address to the Children of Israel (Bani Isra'il).
</p>

<h4>40. The Covenant of Gratitude</h4>

<blockquote>
<b>O Children of Israel, remember My favor...</b>
</blockquote>

<p>
This verse reminds them of their covenant with Allah.
</p>
`
};
// ===== TAB =====
function openTab(tab){
document.querySelectorAll(".content").forEach(c=>c.classList.remove("show"));
document.getElementById(tab).classList.add("show");
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.currentTarget.classList.add("active");
}

// ===== AI =====
function openAI(text){
let prompt=text+"\n\nask me anything related to this section.";
window.open(`https://chat.openai.com/?q=${encodeURIComponent(prompt)}`);
}

// ===== AI BUTTONS =====
function addVerseAI(){
document.querySelectorAll("#contentArea h3,#contentArea h4").forEach(el=>{
if(el.parentElement.classList.contains("section")) return;

let wrap=document.createElement("div");
wrap.className="section";

let btn=document.createElement("button");
btn.className="ai-btn";
btn.innerText="AI";
btn.onclick=()=>openAI(wrap.innerText);

el.parentNode.insertBefore(wrap,el);
wrap.appendChild(btn);

while(el.nextSibling && !["H3","H4"].includes(el.nextSibling.tagName)){
wrap.appendChild(el.nextSibling);
}
wrap.insertBefore(el,btn.nextSibling);
});
}

function addBoxAI(container){
let box=document.querySelector(container+" .content-box");
if(!box || box.querySelector(".ai-btn")) return;

let btn=document.createElement("button");
btn.className="ai-btn";
btn.innerText="AI";
btn.onclick=()=>openAI(box.innerText);

box.appendChild(btn);
}

// ===== BOOKMARK (PERSISTENT) =====
let bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || {
surah:null,
seerah:null,
story:null
};

function enableBookmark(container,type){
let el=document.getElementById(container);
let timer;

el.onmousedown = el.ontouchstart = function(e){
timer=setTimeout(()=>{
let t=e.target;
if(!t.innerText || t.innerText.length<2) return;

if(bookmarks[type]){
let old=document.getElementById(bookmarks[type].id);
if(old) old.classList.remove("highlight");
}

let id="bm-"+Date.now();
t.id=id;
t.classList.add("highlight");

bookmarks[type]={id:id,content:el.innerHTML};

// 🔥 SAVE
localStorage.setItem("bookmarks", JSON.stringify(bookmarks));

alert("Bookmarked");
},600);
};

el.onmouseup = el.ontouchend = ()=>clearTimeout(timer);
}

// ===== INTER TAB NAV =====
function goBookmark(type){

let data = bookmarks[type];
if(!data){ alert("No bookmark"); return; }

let tabId = type==="surah"?"surah":type==="seerah"?"seerah":"story";

document.querySelectorAll(".content").forEach(c=>c.classList.remove("show"));
document.getElementById(tabId).classList.add("show");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
let tabIndex = type==="surah"?0:type==="seerah"?1:2;
document.querySelectorAll(".tab")[tabIndex].classList.add("active");

let targetDiv = type==="surah"?"contentArea":type==="seerah"?"seerahContent":"storyContent";

document.getElementById(targetDiv).innerHTML=
`<div class="content-box">${data.content}</div>`;

addVerseAI();
addBoxAI("#"+targetDiv);
enableBookmark(targetDiv,type);

setTimeout(()=>{
let el=document.getElementById(data.id);
if(el){
el.scrollIntoView({behavior:"smooth",block:"center"});
}
},300);
}

// ===== 114 SURAH =====
const surahNames = [
"Al-Fatiha","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah",
"Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
"Al-Anbiya","Al-Hajj","Al-Mu’minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut",
"Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar",
"Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath",
"Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid",
"Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq",
"At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir",
"Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar",
"Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad",
"Ash-Shams","Al-Lail","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah",
"Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un",
"Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"
];

// ===== INIT =====
window.onload=function(){

let s=document.getElementById("surahSelect");
surahNames.forEach((name,i)=>{
s.innerHTML+=`<option value="${i+1}">${i+1}. ${name}</option>`;
});

let seerahSelect=document.getElementById("seerahSelect");
Object.keys(seerahDB).forEach(k=>{
seerahSelect.innerHTML+=`<option value="${k}">Chapter ${k} - ${seerahDB[k].title}</option>`;
});

let storySelect=document.getElementById("storySelect");
Object.keys(storyDB).forEach(k=>{
storySelect.innerHTML+=`<option value="${k}">${storyDB[k].title}</option>`;
});
};

// ===== LOAD =====
function loadRuku(){
let s=document.getElementById("surahSelect").value;
let r=document.getElementById("rukuSelect");

r.innerHTML=`<option>Select Ruku</option>`;

Object.keys(contentDB).forEach(k=>{
if(k.startsWith(s+".")){
r.innerHTML+=`<option value="${k}">${k}</option>`;
}
});
}

function showRuku(){
let r=document.getElementById("rukuSelect").value;
document.getElementById("contentArea").innerHTML=
`<div class="content-box">${contentDB[r].content}</div>`;

addVerseAI();
enableBookmark("contentArea","surah");
}

function showSeerah(){
let s=document.getElementById("seerahSelect").value;
document.getElementById("seerahContent").innerHTML=
`<div class="content-box"><h3>${seerahDB[s].title}</h3>${seerahDB[s].content}</div>`;

addBoxAI("#seerahContent");
enableBookmark("seerahContent","seerah");
}

function showStory(){
let s=document.getElementById("storySelect").value;
document.getElementById("storyContent").innerHTML=
`<div class="content-box"><h3>${storyDB[s].title}</h3>${storyDB[s].content}</div>`;

addBoxAI("#storyContent");
enableBookmark("storyContent","story");
}

</script>
</head>

<body>

<header>Surah & Seerah Explorer</header>

<div style="font-size:12px;text-align:center;padding:6px;background:#d0ebff;color:#084298;">
⋮ Click three dots (⋮) in top right corner of chrome browser and click translate to change to desired language<br>
⭐ Long pressing any word bookmarks the section
</div>

<div class="bookmark-bar">
<div class="bookmark-label">BOOKMARK</div>
<div class="bookmark-buttons">
<button class="bookmark-btn btn-surah" onclick="goBookmark('surah')">Surah</button>
<button class="bookmark-btn btn-seerah" onclick="goBookmark('seerah')">Seerah</button>
<button class="bookmark-btn btn-story" onclick="goBookmark('story')">Story</button>
</div>
</div>

<div class="tabs">
<div class="tab active" onclick="openTab('surah')">Surah</div>
<div class="tab" onclick="openTab('seerah')">Seerah</div>
<div class="tab" onclick="openTab('story')">Story</div>
</div>

<div id="surah" class="content show">
<select id="surahSelect" onchange="loadRuku()">
<option value="">Select Surah</option>
</select>

<select id="rukuSelect" onchange="showRuku()"></select>

<div id="contentArea"></div>
</div>

<div id="seerah" class="content">
<select id="seerahSelect" onchange="showSeerah()"></select>
<div id="seerahContent"></div>
</div>

<div id="story" class="content">
<select id="storySelect" onchange="showStory()"></select>
<div id="storyContent"></div>
</div>

</body>
</html>
