<style>
body {
    font-family:'Segoe UI',sans-serif;

    background:#0f3d2e;

    padding:12px;
    text-align:center;
    font-weight:bold;
    font-size:16px;
}

.tabs { display:flex;background:#145a42; }

.tab {
    flex:1;
    padding:10px;
    text-align:center;
    color:white;
    cursor:pointer;
    font-size:14px;
}

.active { background:#1abc9c; }

.content {
    display:none;

.show { display:block; }

select {
    width:100%;
    padding:10px;
    margin-bottom:10px;

/* ✅ CONTENT BOX FIX */
.content-box{
    background:white;

    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    position:relative;
    word-wrap:break-word;
    overflow-wrap:break-word;
}

/* SECTION WRAPPER */
.section{
    position:relative;
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

    width:30px;
    height:30px;
    border-radius:50%;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    color:white;
    border:none;
    font-size:10px;
    cursor:pointer;
    position:absolute;
    top:6px;
    right:6px;
}

/* ✅ TEXT FIX */
p, li, blockquote {
    font-size:14px;
    line-height:1.5;
}

/* ✅ BLOCKQUOTE FIX */

    overflow-x:auto;
    word-break:break-word;
}

<script>

// ===== TAB =====
function openTab(tab){
document.querySelectorAll(".content").forEach(c=>c.classList.remove("show"));
document.getElementById(tab).classList.add("show");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.currentTarget.classList.add("active");
}

// ===== AI HANDLERS =====

function handleSeerahAI(text){
let prompt = `${text}

ask me anything related to the above section.`;

window.open(`https://chat.openai.com/?q=${encodeURIComponent(prompt)}`);
}

function handleRukuAI(text){
let prompt = `${text}


ask me anything related to this section.`; 

window.open(`https://chat.openai.com/?q=${encodeURIComponent(prompt)}`);
}

// ===== ADD AI BUTTONS =====

function addSeerahAI(){
let box = document.querySelector("#seerahContent .content-box");
if(!box) return;

if(box.querySelector(".ai-btn")) return;

let btn = document.createElement("button");
btn.className="ai-btn";
btn.innerText="AI";

btn.onclick = ()=>handleSeerahAI(box.innerText);

box.appendChild(btn);
}

function addVerseAI(){

document.querySelectorAll("#contentArea h3").forEach(el=>{

    if(el.parentElement.classList.contains("section")) return;

    let wrapper = document.createElement("div");
    wrapper.className = "section";

    let btn = document.createElement("button");
    btn.className = "ai-btn";
    btn.innerText = "AI";

    btn.onclick = function(){
        handleRukuAI(wrapper.innerText);
    };

    el.parentNode.insertBefore(wrapper, el);
    wrapper.appendChild(btn);

    while(el.nextSibling && !["H3","H4"].includes(el.nextSibling.tagName)){
        wrapper.appendChild(el.nextSibling);
    }

    wrapper.insertBefore(el, btn.nextSibling);
});

document.querySelectorAll("#contentArea h4").forEach(el=>{

    if(el.parentElement.classList.contains("section")) return;

    let wrapper = document.createElement("div");
    wrapper.className = "section";

    let btn = document.createElement("button");
    btn.className = "ai-btn";
    btn.innerText = "AI";

    btn.onclick = function(){
        handleRukuAI(wrapper.innerText);
    };

    el.parentNode.insertBefore(wrapper, el);
    wrapper.appendChild(btn);

    while(el.nextSibling && el.nextSibling.tagName !== "H4"){
        wrapper.appendChild(el.nextSibling);
    }

    wrapper.insertBefore(el, btn.nextSibling);
});

}

// ===== STORY AI =====
function addStoryAI(){
let box = document.querySelector("#storyContent .content-box");

if(box.querySelector(".ai-btn")) return;

let btn = document.createElement("button");
btn.className="ai-btn";
btn.innerText="AI";

btn.onclick = ()=>handleSeerahAI(box.innerText);

box.appendChild(btn);

Surah Al-Fatiha is the "Mother of the Book" (*Umm al-Kitab*). Unlike the long, legislative Surahs revealed in Madinah, Al-Fatiha was revealed in Makkah. It serves as the opening chapter of the Quran and the fundamental prayer for every Muslim. It is unique because it is composed entirely as a direct conversation between the servant and the Creator—the first half praises Allah, and the second half presents the servant’s needs. It is the bridge between human limitation and Divine Majesty.
</p>

</p>

<li>The Day of Judgment is described as a place where no "compensation" or "intercession" will be accepted for those who rejected the truth. While the intercession of Prophets exists for sinful believers, it cannot be used as a "loophole" by those who intentionally turned away from the Divine Covenant.</li>
</ul>

<h4 style="color:#1abc9c;"><b>49–50. The Miracle of the Sea</b></h4>

<blockquote style="background:#f9f9f9;padding:10px;border-left:4px solid #1abc9c;">
<b>وَإِذْ نَجَّيْنَاكُم مِّنْ آلِ فِرْعَوْنَ يَسُومُونَكُمْ سُوءَ الْعَذَابِ... ﴿٤٩﴾ وَإِذْ فَرَقْنَا بِكُمُ الْبَحْرَ فَأَنجَيْنَاكُمْ وَأَغْرَقْنَا آلَ فِرْعَوْنَ وَأَنتُمْ تَنظُرُونَ ﴿٥٠﴾</b><br><br>

<b>"And [recall] when We saved your forefathers from the people of Pharaoh... And [recall] when We parted the sea for you and saved you and drowned the people of Pharaoh while you were looking on."</b><br><br>

<b>और (याद करो) जब हमने तुम्हें फ़िरऔन के लोगों से निजात दी जो तुम्हें बुरा अज़ाब देते थे... और जब हमने तुम्हारे लिए समंदर को फाड़ दिया और तुम्हें बचा लिया और फ़िरऔन वालों को डुबो दिया और तुम देख रहे थे।</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
This part vividly describes the transition from the "horrible torment" of slavery under Pharaoh to the "miraculous freedom" at the sea. It highlights that Allah didn't just save them; He let them *watch* as their powerful oppressor was defeated. The phrase "while you were looking on" indicates that the destruction of their enemy was made a public spectacle to heal their psychological wounds from generations of slavery.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<ul>
<li>The "horrible torment" included the slaughter of their newborn sons and the sparing of their daughters for domestic servitude. This deliverance occurred on the day of *Ashura*, which the Prophet ﷺ later commanded Muslims to fast in gratitude, linking the history of Bani Isra'il to the Ummah of Islam.</li>

<li>The parting of the sea is a sign of Allah’s absolute power over nature. It serves as a reminder that when a believer is trapped between an enemy and a sea, Allah can create a path where there seems to be none, provided there is faith and trust in the Divine promise.</li>
</ul>

<h4 style="color:#1abc9c;"><b>51–54. The Betrayal and Repentance</b></h4>

<blockquote style="background:#f9f9f9;padding:10px;border-left:4px solid #1abc9c;">
<b>وَإِذْ وَاعَدْنَا مُوسَىٰ أَرْبَعِينَ لَيْلَةً ثُمَّ اتَّخَذْتُمُ الْعِجْلَ مِن بَعْدِهِ... ﴿٥١﴾ ثُمَّ عَفَوْنَا عَنكُم مِّن بَعْدِ ذَٰلِكَ... ﴿٥٢﴾</b><br><br>

<b>"And [recall] when We made an appointment with Moses for forty nights. Then you took the calf [for worship] after him... Then We forgave you after that..."</b><br><br>

<b>और जब हमने मूसा (अलैहि.) से चालीस रातों का वादा किया, फिर उनके पीछे तुमने बछड़े को (माबूद) बना लिया... फिर हमने उसके बाद तुम्हें माफ़ कर दिया...</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
Here, the Quran exposes how fragile their faith was. As soon as Musa (AS) went to the mountain to receive the Torah, they went back to worshipping a golden calf. It shows that they were still mentally "enslaved" to visible idols. Their repentance required a very difficult physical and spiritual sacrifice—a "killing" of their old, sinful selves—to prove they were ready to return to pure Monotheism.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<ul>
<li>The incident of the calf is a warning that spiritual instability often follows great miracles if the heart is not grounded. The command to "kill yourselves" (the guilty among them) was a severe test of their sincerity, showing that some sins are so grave that their purification requires extreme sacrifice.</li>

<li>Even after such a massive sin, Allah used the word "forgave." This proves that there is no sin too great for Allah’s mercy, provided the repentance follows the Divine protocol. It highlights that the doors of mercy are never closed as long as a person is willing to admit their fault.</li>
</ul>

<h4 style="color:#1abc9c;"><b>55–56. The Thunderbolt and Rebirth</b></h4>

<blockquote style="background:#f9f9f9;padding:10px;border-left:4px solid #1abc9c;">
<b>وَإِذْ قُلْتُمْ يَا مُوسَىٰ لَن نُّؤْمِنَ لَكَ حَتَّىٰ نَرَى اللَّهَ جَهْرَةً فَأَخَذَتْكُمُ الصَّاعِقَةُ... ﴿٥٥﴾ ثُمَّ بَعَثْنَاكُم مِّن بَعْدِ مَوْتِكُمْ لَعَلَّكُمْ تَشْكُرُونَ ﴿٥٦﴾</b><br><br>

<b>"And [recall] when you said, 'O Moses, we will never believe you until we see Allah outright'; so the thunderbolt took you... Then We revived you after your death that perhaps you would be grateful."</b><br><br>

<b>और जब तुमने कहा, "ऐ मूसा! हम हरगिज़ तुम्हारा यक़ीन नहीं करेंगे जब तक हम अल्लाह को साफ़-साफ़ न देख लें"; तो तुम्हें बिजली ने आ पकड़ा... फिर हमने तुम्हें तुम्हारी मौत के बाद ज़िन्दा किया ताकि तुम शुक्रगुज़ार बनो।</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
This verse describes their ultimate stubbornness and materialist mindset. They demanded to see Allah with their physical eyes as a condition for faith. Since human eyes cannot endure the pure Majesty of Allah in this world, they were struck by a thunderbolt. But Allah, in His infinite mercy, brought them back to life—using the same word for "Resurrection"—to give them another chance to develop gratitude.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<ul>
<li>Demanding to "see Allah" out of stubbornness is a sign of extreme disrespect (*Be-Adabi*). This event served as a "visual proof" of the Day of Resurrection, showing that life and death are entirely within Divine command and can be reversed at any moment.</li>

<li>Being brought back to life after perishing was a "second chance" at existence. It highlights that the purpose of physical life is to develop spiritual gratitude (*Shukr*). Without gratitude, a person is spiritually dead even if they are physically breathing.</li>
</ul>

<h4 style="color:#1abc9c;"><b>57–59. The Provisions and the Mockery</b></h4>

<blockquote style="background:#f9f9f9;padding:10px;border-left:4px solid #1abc9c;">
<b>وَظَلَّلْنَا عَلَيْكُمُ الْغَمَامَ وَأَنزَلْنَا عَلَيْكُمُ الْمَنَّ وَالسَّلْوَىٰ... ﴿٥٧﴾ فَبَدَّلَ الَّذِينَ ظَلَمُوا قَوْلًا غَيْرَ الَّذِي قِيلَ لَهُمْ... ﴿٥٩﴾</b><br><br>

<b>"And We shaded you with clouds and sent down to you manna and quails... But those who wronged changed [those words] to a statement other than that which had been said to them..."</b><br><br>

<b>और हमने तुम पर बादलों का साया किया और तुम पर 'मन्न और सलवा' उतारा... मगर उन ज़ालिमों ने उस बात को बदल दिया जो उनसे कही गई थी...</b>
</blockquote>

<p><b>Literary Explanation</b></p>

<p>
Even in the hot desert, Allah protected them with "clouds" for shade and "heavenly food" (Manna and Salwa) that required no labor. However, when told to enter a city with humility saying a word of seeking forgiveness (*Hittatun*), they mockingly changed the word. Because they turned a sacred ritual into a joke, they faced a plague as a consequence. It shows that they were more concerned with their desires than their spiritual dignity.
</p>

<p><b>Tafsir (based on Ibn Kathir, Noor ul Irfan)</b></p>

<ul>
<li>The "cloud" followed them like a canopy in the wilderness, providing a constant miracle of comfort. The "plague" sent upon them was a direct result of their mocking the Divine command, proving that Allah does not tolerate the mockery of His rituals or the twisting of His words.</li>

<li>Changing the word of repentance to a word of mockery (related to food) represents a deeper disease: the habit of twisting Divine commands to fit worldly desires. It teaches the believers that the specific words of *Dhikr* and *Salah* are fixed by Allah and must be respected exactly as they were taught.</li>
</ul>

function loadRukuDropdown(){

let r=document.getElementById("rukuSelect");

r.innerHTML=`<option value="">Select Ruku</option>`;

}
}

function showRuku(){
let s=document.getElementById("surahSelect").value;
let r=document.getElementById("rukuSelect").value;

let data=rukuData[s].rukus[r].content[0];

function showSeerah(){

function showStory(){

let story=storyData[ch];

`<div class="content-box">
